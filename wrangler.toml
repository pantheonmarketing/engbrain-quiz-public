name = "engbrain-quiz"
main = "src/worker.js"
compatibility_date = "2024-09-25"

[assets]
directory = "./public"
binding = "ASSETS"

# Create and fill this before production deploy:
#   npx wrangler kv namespace create LEADS_KV
#   npx wrangler kv namespace create LEADS_KV --preview
# Then replace both IDs below.
[[kv_namespaces]]
binding = "LEADS_KV"
id = "REPLACE_WITH_YOUR_LEADS_KV_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_LEADS_KV_ID"
